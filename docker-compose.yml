services:
  db:
    image: postgres:15-alpine
    container_name: teencare_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: teencare
      POSTGRES_PASSWORD: teencare123
      POSTGRES_DB: teencare
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teencare -d teencare"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teencare_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://teencare:teencare123@db:5432/teencare
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "node dist/seed.js && node dist/index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: teencare_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3002:3000"
    depends_on:
      - backend

volumes:
  pgdata:
    name: teencare_pgdata
