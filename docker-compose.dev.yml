services:
  db:
    image: postgres:15-alpine
    container_name: teencare_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: teencare
      POSTGRES_PASSWORD: teencare123
      POSTGRES_DB: teencare
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teencare -d teencare"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: node:20-alpine
    container_name: teencare_backend_dev
    working_dir: /app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://teencare:teencare123@db:5432/teencare
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules        # anonymous volume so host node_modules don't override
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "apk add --no-cache openssl && npm install && node dist/seed.js ; npm run dev"

  frontend:
    image: node:20-alpine
    container_name: teencare_frontend_dev
    working_dir: /app
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      WATCHPACK_POLLING: "true"   # needed for hot reload inside Docker on macOS
    ports:
      - "3002:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --port 3000"

volumes:
  pgdata_dev:
    name: teencare_pgdata_dev
